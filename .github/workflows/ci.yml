name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev,postgres]"
      - name: Lint
        run: ruff check .
      - name: Import check
        run: python -c "import pipelines.run, pipelines.models"
      - name: List registry
        run: python -m pipelines.run --list
      - name: Tests
        run: pytest -q
