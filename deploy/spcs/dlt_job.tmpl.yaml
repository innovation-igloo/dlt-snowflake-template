# SPCS job spec template for a single dlt pipeline run.
#
# Uploaded to @DLT_DB.DEPLOY.SPECS (see sql/06_pipeline_registry.sql) and
# referenced by the generated Tasks:
#
#   EXECUTE JOB SERVICE
#     IN COMPUTE POOL DLT_POOL
#     NAME = dlt_job_<pipeline>
#     FROM @DLT_DB.DEPLOY.SPECS
#       SPECIFICATION_TEMPLATE_FILE = 'dlt_job.tmpl.yaml'
#       USING (pipeline => '<pipeline>');
#
# The `{{ pipeline }}` placeholder is substituted from the USING clause, so one
# template + one image drives every pipeline. Adding a pipeline needs no rebuild
# and no new spec file: INSERT a row (registry_sync) and generate its Task.
#
# The container reads its full spec from DLT_DB.OPS.PIPELINE_REGISTRY at runtime
# (DLT_REGISTRY_SOURCE=auto -> table, because the OAuth session token is mounted
# in SPCS). Snowflake auth uses that ambient token; no secrets are baked in.
spec:
  containers:
    - name: dlt
      image: /DLT_DB/DEPLOY/IMAGES/dlt-pipeline:latest
      args:
        - "{{ pipeline }}"
      env:
        DESTINATION__SNOWFLAKE__CREDENTIALS__AUTHENTICATOR: oauth
        DESTINATION__SNOWFLAKE__CREDENTIALS__DATABASE: DLT_DB
        DESTINATION__SNOWFLAKE__CREDENTIALS__WAREHOUSE: DLT_WH
        DLT_REGISTRY_SOURCE: auto
        LOG_LEVEL: INFO
