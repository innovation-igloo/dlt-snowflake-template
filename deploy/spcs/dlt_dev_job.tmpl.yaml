# SPCS job spec template for an ad-hoc dlt DEV run.
#
# This is the "develop in Snowflake" spec: it loads into the DEV database using a
# per-developer dataset schema, and injects the source credential from a
# Snowflake SECRET object (no local .dlt/secrets.toml required).
#
# Uploaded to @DLT_DB.DEPLOY.SPECS (see sql/base/03_registry.sql) and launched
# ad-hoc (see Makefile `dev-run`):
#
#   EXECUTE JOB SERVICE
#     IN COMPUTE POOL DLT_DEV_POOL
#     NAME = dlt_dev_<pipeline>
#     FROM @DLT_DB.DEPLOY.SPECS
#       SPECIFICATION_TEMPLATE_FILE = 'dlt_dev_job.tmpl.yaml'
#       [ EXTERNAL_ACCESS_INTEGRATIONS = (<eai>) ]   -- only for external sources
#       USING (
#         pipeline => '<pipeline>',
#         dataset  => 'DEV_<user>',
#         secret   => 'DLT_DB.OPS.<SECRET_NAME>',
#         env_var  => 'SOURCES__<PIPELINE>__CREDENTIALS'   -- or ..._TOKEN
#       );
#
# Template variables ({{ ... }}) are substituted from the USING clause before the
# YAML is parsed, so one template drives any pipeline + secret + dataset.
#
# Destination auth uses the ambient SPCS OAuth token; the destination DATABASE is
# DLT_DEV_DB and the schema is the per-developer DLT_DATASET. The source secret is
# bound from a Snowflake SECRET (GENERIC_STRING) into the dlt env var named by
# {{ env_var }}, which pipelines/run.py resolves via dlt.secrets.
spec:
  containers:
    - name: dlt
      image: /DLT_DB/DEPLOY/IMAGES/dlt-pipeline:latest
      args:
        - {{ pipeline }}
      env:
        DESTINATION__SNOWFLAKE__CREDENTIALS__AUTHENTICATOR: oauth
        DESTINATION__SNOWFLAKE__CREDENTIALS__DATABASE: DLT_DEV_DB
        DESTINATION__SNOWFLAKE__CREDENTIALS__WAREHOUSE: DLT_DEV_WH
        # registry_store reads the control-plane registry with these connector
        # vars; the dev role can only use DLT_DEV_WH (not DLT_WH).
        SNOWFLAKE_WAREHOUSE: DLT_DEV_WH
        SNOWFLAKE_DATABASE: DLT_DB
        DLT_REGISTRY_SOURCE: auto
        DLT_DATASET: {{ dataset }}
        LOG_LEVEL: INFO
      secrets:
        - snowflakeSecret: {{ secret }}
          secretKeyRef: secret_string
          envVarName: {{ env_var }}
