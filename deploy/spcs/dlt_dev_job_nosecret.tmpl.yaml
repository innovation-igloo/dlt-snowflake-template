# SPCS job spec template for an ad-hoc dlt DEV run WITHOUT a source secret.
#
# Same as dlt_dev_job.tmpl.yaml but with no `secrets:` block — for sources that
# need no credential (e.g. the in-code `sample` generator, or a source whose
# config carries no `secret:` ref). Destination auth is the ambient SPCS OAuth
# token; data lands in DLT_DEV_DB under the per-developer {{ dataset }} schema.
#
# Uploaded to @DLT_DB.DEPLOY.SPECS (see sql/base/03_registry.sql). The Makefile
# `dev-run` target picks this template automatically when SECRET is not set:
#
#   EXECUTE JOB SERVICE
#     IN COMPUTE POOL DLT_DEV_POOL
#     NAME = dlt_dev_<pipeline>
#     FROM @DLT_DB.DEPLOY.SPECS
#       SPECIFICATION_TEMPLATE_FILE = 'dlt_dev_job_nosecret.tmpl.yaml'
#       USING (pipeline => '<pipeline>', dataset => 'DEV_<user>');
spec:
  containers:
    - name: dlt
      image: /DLT_DB/DEPLOY/IMAGES/dlt-pipeline:latest
      args:
        - {{ pipeline }}
      env:
        DESTINATION__SNOWFLAKE__CREDENTIALS__AUTHENTICATOR: oauth
        DESTINATION__SNOWFLAKE__CREDENTIALS__DATABASE: DLT_DEV_DB
        DESTINATION__SNOWFLAKE__CREDENTIALS__WAREHOUSE: DLT_DEV_WH
        # registry_store reads the control-plane registry with these connector
        # vars; the dev role can only use DLT_DEV_WH (not DLT_WH).
        SNOWFLAKE_WAREHOUSE: DLT_DEV_WH
        SNOWFLAKE_DATABASE: DLT_DB
        DLT_REGISTRY_SOURCE: auto
        DLT_DATASET: {{ dataset }}
        LOG_LEVEL: INFO
